<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — InsurTech Pro</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #F5F6FA; color: #1C1B1F; }
    .card { text-align: center; padding: 2.5rem; max-width: 400px; background: white;
            border-radius: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 .5rem; color: #002169; }
    p  { color: #49454F; margin: 0 0 1.5rem; line-height: 1.5; }
    button { background: #002169; color: white; border: none; padding: .75rem 2rem;
             border-radius: .75rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0058be; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet. Los datos guardados siguen disponibles.<br>Reconectando cuando vuelva la señal.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
